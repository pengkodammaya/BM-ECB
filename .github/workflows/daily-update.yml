name: Daily Nowcast Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install numpy scipy pandas openpyxl pyarrow scikit-learn statsmodels pydantic click httpx rich yfinance

      - name: Ensure data directories exist
        run: mkdir -p data/malaysia output/malaysia

      - name: Setup FRED API key
        run: echo "${{ secrets.FRED_API_KEY }}" > .fred_key

      - name: Run daily update
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE/src"
          echo "PYTHONPATH=$PYTHONPATH"
          echo "=== Source files ==="
          ls src/nowcasting_toolbox/data/__init__.py
          echo "=== Test import ==="
          python -c "from nowcasting_toolbox.data.sources.opendosm import OpenDOSMClient; print('OK')"
          echo "=== Running ==="
          python scripts/daily_update.py

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leaderboard.csv docs/daily_log.csv docs/leaderboard.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update: $(date +%Y-%m-%d)"
            git push
          fi
