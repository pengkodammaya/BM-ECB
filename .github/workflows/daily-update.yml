name: Daily Nowcast Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install numpy scipy pandas openpyxl pyarrow scikit-learn statsmodels pydantic click httpx rich yfinance

      - name: Ensure data directories exist
        run: mkdir -p data/malaysia output/malaysia

      - name: Run daily update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE/src"
          echo "Git HEAD: $(git rev-parse --short HEAD)"
          python scripts/daily_update.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Ensure files are flushed to disk
          sync
          sleep 2
          # Show what changed
          git status --short
          git diff --stat
          # Stage and commit (files may not exist yet)
          for f in docs/leaderboard.csv docs/daily_log.csv docs/leaderboard.md docs/dashboard.md docs/dashboard.html docs/data.json docs/actuals_vintage.csv docs/consensus_cache.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          if git diff --staged --quiet; then
            echo "No file changes detected. Forcing commit with empty marker."
            git commit --allow-empty -m "Daily update (no data change): $(date +%Y-%m-%d)"
          else
            echo "Files changed. Committing."
            git commit -m "Daily update: $(date +%Y-%m-%d)"
          fi
          git push
