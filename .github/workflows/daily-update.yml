name: Daily Nowcast Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (pip, no build system needed)
        run: |
          pip install numpy scipy pandas openpyxl pyarrow scikit-learn statsmodels pydantic click httpx rich

      - name: Ensure data directories exist
        run: mkdir -p data/malaysia output/malaysia

      - name: Debug: list source files
        run: |
          echo "=== Source tree ==="
          find src/nowcasting_toolbox -name "*.py" | head -60
          echo "=== Checking data/__init__.py ==="
          cat src/nowcasting_toolbox/data/__init__.py

      - name: Run daily update
        run: |
          cd "$GITHUB_WORKSPACE"
          export PYTHONPATH="$PWD/src:$PYTHONPATH"
          echo "PYTHONPATH=$PYTHONPATH"
          python -c "import sys; print(sys.path[:5])"
          python -c "from nowcasting_toolbox.data.sources.opendosm import OpenDOSMClient; print('Import OK')"
          python scripts/daily_update.py

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leaderboard.csv docs/daily_log.csv docs/leaderboard.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update: $(date +%Y-%m-%d)"
            git push
          fi
