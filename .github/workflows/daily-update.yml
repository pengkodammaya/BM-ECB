name: Daily Nowcast Update

on:
  schedule:
    # Runs at 00:00 UTC (8:00 AM Malaysia time) daily
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run daily update (fetch + nowcast + leaderboard)
        run: python scripts/daily_update.py

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leaderboard.csv docs/daily_log.csv docs/index.html
          git diff --staged --quiet || git commit -m "Daily update: $(date +%Y-%m-%d)"
          git push
