name: Daily Nowcast Update

on:
  schedule:
    # Runs at 00:00 UTC (8:00 AM Malaysia time) daily
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ensure data directories exist
        run: mkdir -p data/malaysia output/malaysia

      - name: Run daily update (fetch + nowcast + leaderboard)
        run: |
          PYTHONPATH="$PWD/src:$PYTHONPATH" uv run python scripts/daily_update.py
        env:
          PYTHONUNBUFFERED: 1
          PYTHONIOENCODING: utf-8

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/leaderboard.csv docs/daily_log.csv docs/leaderboard.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update: $(date +%Y-%m-%d)"
            git push
          fi
